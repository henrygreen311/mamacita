name: Sporty

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours

jobs:
  sporty:
    runs-on: ubuntu-latest
    timeout-minutes: 330  # 5h 30m max runtime

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install playwright
          npx playwright install firefox
          npm install fs

      - name: Run sporty.js
        run: |
          node sporty.js || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push updated JSON files if they exist and changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          FILES_CHANGED=false

          for file in result.json session.json; do
            if [ -f "$file" ]; then
              git add "$file"
              if ! git diff --cached --quiet "$file"; then
                FILES_CHANGED=true
              fi
            fi
          done

          if [ "$FILES_CHANGED" = true ]; then
            git commit -m "Update result.json and/or session.json after sporty run"
            git push
          else
            echo "No changes in result.json or session.json, skipping commit."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
