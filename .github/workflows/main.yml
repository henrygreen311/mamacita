name: Sporty

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours

jobs:
  sporty:
    runs-on: ubuntu-latest
    timeout-minutes: 330  # 5h 30m max runtime

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          npm install playwright
          npx playwright install firefox
          npm install fs

      # Step 1: Run sporty.js to refresh/create session.json
      - name: Run sporty.js with xvfb
        run: |
          xvfb-run -a node sporty.js || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Commit and push session.json if updated
      - name: Commit and push session.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if [ -f session.json ]; then
            git add session.json
            if ! git diff --cached --quiet session.json; then
              git commit -m "Update session.json after sporty.js run"
              git push
            else
              echo "No changes in session.json, skipping commit."
            fi
          else
            echo "No session.json file found, skipping commit."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 3: Run main.js (which updates result.json)
      - name: Run main.js with xvfb
        run: |
          xvfb-run -a node main.js || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 4: Commit and push session.json (force push version)
      - name: Commit and push session.json (force)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if [ -f session.json ]; then
            git add session.json
            if ! git diff --cached --quiet session.json; then
              git commit -m "Update session.json after sporty.js run" || true
              git pull --rebase origin ${{ github.ref }} || true
              git push origin HEAD:${{ github.ref }} --force
            else
              echo "No changes in session.json, skipping commit."
            fi
          else
            echo "No session.json file found, skipping commit."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 5: Commit and push result.json (force overwrite)
      - name: Commit and push result.json (force overwrite)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if [ -f result.json ]; then
            git add result.json
            if ! git diff --cached --quiet result.json; then
              git commit -m "Update result.json after main.js run" || true
              git fetch origin
              git reset --soft origin/${{ github.ref }}
              git push origin HEAD:${{ github.ref }} --force
            else
              echo "No changes in result.json, skipping commit."
            fi
          else
            echo "No result.json file found, skipping commit."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
